<svg viewBox="0 0 900 270" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="c1"><rect x="30" y="59" width="0" height="20"><animate id="t1" attributeName="width" from="0" to="423" dur="1.9s" begin="0.5s" fill="freeze"/></rect></clipPath>
    <clipPath id="c2"><rect x="30" y="89" width="0" height="20"><animate id="t2" attributeName="width" from="0" to="306" dur="1.4s" begin="t1.end+0.3s" fill="freeze"/></rect></clipPath>
    <clipPath id="c3"><rect x="30" y="119" width="0" height="20"><animate id="t3" attributeName="width" from="0" to="360" dur="1.6s" begin="t2.end+0.5s" fill="freeze"/></rect></clipPath>
    <clipPath id="c4"><rect x="30" y="149" width="0" height="20"><animate id="t4" attributeName="width" from="0" to="423" dur="1.9s" begin="t3.end+0.3s" fill="freeze"/></rect></clipPath>
    <clipPath id="c5"><rect x="30" y="179" width="0" height="20"><animate id="t5" attributeName="width" from="0" to="387" dur="1.8s" begin="t4.end+0.5s" fill="freeze"/></rect></clipPath>
    <clipPath id="c6"><rect x="30" y="209" width="0" height="20"><animate id="t6" attributeName="width" from="0" to="441" dur="2s" begin="t5.end+0.3s" fill="freeze"/></rect></clipPath>
  </defs>

  <rect x="8" y="8" width="884" height="254" rx="12" fill="#0d1117" stroke="#22d3ee" stroke-opacity="0.5" stroke-width="1.5"/>
  <rect x="8" y="8" width="884" height="34" rx="12" fill="#161b22"/>
  <rect x="8" y="26" width="884" height="16" fill="#161b22"/>
  <circle cx="30" cy="25" r="6" fill="#ff5f56"/>
  <circle cx="50" cy="25" r="6" fill="#ffbd2e"/>
  <circle cx="70" cy="25" r="6" fill="#27c93f"/>
  <text x="450" y="30" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#7d8590">akha-security — zsh</text>

  <g font-family="'Courier New', monospace" font-size="15">
    <g clip-path="url(#c1)"><text x="30" y="75" fill="#22d3ee">$ akha-xss scan --target example.com --deep</text></g>
    <g clip-path="url(#c2)"><text x="30" y="105" fill="#4ade80">[+] Found 3 potential XSS vectors</text></g>
    <g clip-path="url(#c3)"><text x="30" y="135" fill="#22d3ee">$ akha-sourcemap -u example.com/app.min.js.map</text></g>
    <g clip-path="url(#c4)"><text x="30" y="165" fill="#4ade80">[+] Extracted 12 endpoints, 2 exposed API keys</text></g>
    <g clip-path="url(#c5)"><text x="30" y="195" fill="#22d3ee">$ akca -u example.com</text></g>
    <g clip-path="url(#c6)"><text x="30" y="225" fill="#fbbf24">[*] Scanning... generating vulnerability report</text></g>
  </g>

  <rect x="471" y="211" width="9" height="18" fill="#fbbf24">
    <animate attributeName="opacity" values="1;0;1" dur="0.9s" begin="t6.end" repeatCount="indefinite"/>
  </rect>
</svg>
